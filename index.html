<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的頂級資產追蹤系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.8) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .bg-finance-dark {
            background-color: #0B0F19;
        }
    </style>
</head>
<body class="bg-finance-dark text-gray-100 min-h-screen pb-28">

    <div class="p-4 pt-6">
        <div class="relative overflow-hidden rounded-3xl p-6 bg-gradient-to-br from-slate-800 via-slate-900 to-black border border-slate-700/40 shadow-2xl">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
            
            <div class="flex flex-wrap justify-between items-start gap-4">
                <div>
                    <h1 class="text-xs uppercase tracking-widest text-slate-400 font-bold">Net Worth · 總資產估值</h1>
                    <div id="total-value" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-300 to-emerald-200 tracking-tight my-2 break-all">
                        $0
                    </div>
                </div>
                <button onclick="fetchAllData()" id="btn-refresh" class="bg-slate-800/80 hover:bg-slate-700 border border-slate-700/60 text-slate-200 px-4 py-2.5 rounded-xl text-xs font-black flex items-center gap-1 active:scale-95 transition shadow-sm shrink-0">
                    🔄 同步數據
                </button>
            </div>
            
            <div class="w-full h-px bg-slate-800/60 my-4"></div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                <div>
                    <span class="text-slate-400 block text-xs uppercase font-bold mb-0.5">投入總成本</span>
                    <span id="total-cost" class="text-slate-100 font-black text-base tracking-wide break-all">0</span>
                </div>
                <div class="sm:text-right">
                    <span class="text-slate-400 block text-xs uppercase font-bold mb-0.5">未實現總損益</span>
                    <span id="total-profit" class="font-black text-base tracking-wide break-all">0</span>
                </div>
            </div>
            <div id="update-status" class="text-xs text-slate-500 mt-2.5 text-right font-medium italic">系統就緒</div>
        </div>
    </div>

    <div class="px-4 mb-4">
        <div class="glass-panel border border-slate-800/80 rounded-2xl p-5 shadow-xl relative overflow-hidden">
            <div class="absolute -left-6 -bottom-6 w-20 h-20 bg-teal-500/5 rounded-full blur-2xl"></div>
            <div class="flex flex-wrap justify-between items-center gap-2 mb-3">
                <div class="flex items-center gap-1.5">
                    <span class="text-teal-400 text-base">🔮</span>
                    <h2 class="text-sm font-black tracking-wide text-slate-200">投行級 AI 操盤晨報</h2>
                </div>
                <span id="ai-date" class="text-xs font-mono font-bold px-2 py-0.5 rounded-md bg-slate-950/60 text-slate-400">加載中...</span>
            </div>
            <div id="ai-report-content" class="text-xs text-slate-300 leading-relaxed whitespace-pre-wrap font-sans max-h-56 overflow-y-auto pr-1">
                正在連線 Google 雲端大腦讀取最新投行晨報策略...
            </div>
        </div>
    </div>

    <div class="px-4 mb-5 flex flex-wrap gap-2">
        <button onclick="toggleModal(true)" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black py-4 px-4 rounded-2xl text-sm tracking-wide shadow-lg shadow-emerald-900/20 active:scale-98 transition flex justify-center items-center gap-1 min-w-[180px]">
            ➕ 新增 / 調整持股資產
        </button>
        <button onclick="resetToDefault()" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-400 py-4 px-5 rounded-2xl text-xs font-bold active:scale-98 transition">
            重置
        </button>
    </div>

    <div class="px-4 space-y-3" id="stock-list-container">
        </div>

    <div class="p-8 text-center text-slate-600 text-xs tracking-wider space-y-1 font-bold">
        <div>🔒 ENCRYPTED LOCAL STORAGE · SECURE SANDBOX</div>
        <div>V9.7 PREMIUM BANK-INTEGRATED PLATFORM</div>
    </div>

    <div id="stock-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 overflow-y-auto">
        <div class="bg-slate-900 w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-0 shadow-2xl border border-slate-800/80 overflow-hidden my-auto">
            
            <div id="yahoo-link-container" class="p-5 bg-emerald-950/20 border-b border-slate-800">
                <button type="button" id="yahoo-stock-link-btn" class="w-full bg-slate-950/80 hover:bg-emerald-950/50 text-emerald-400 border border-emerald-500/50 font-black py-4 px-4 rounded-xl flex items-center justify-center gap-2 transition active:scale-95 text-sm tracking-wider shadow-md text-center cursor-pointer">
                    🔍 查詢個股盤勢 (外連 Yahoo 股市)
                </button>
            </div>

            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-base font-bold text-slate-200 tracking-wide">編輯持股資訊</h3>
                    <button onclick="toggleModal(false)" class="text-slate-400 text-xl p-2">&times;</button>
                </div>

                <form id="stock-form" onsubmit="saveStock(event)" class="space-y-4 text-sm font-bold">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">股票代號</label>
                        <input type="text" id="form-symbol" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">股票名稱</label>
                        <input type="text" id="form-name" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">即時庫存 (股)</label>
                            <input type="number" id="form-shares" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">成本均價 (元)</label>
                            <input type="number" step="0.01" id="form-cost" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">最新現價 (元)</label>
                        <input type="number" step="0.01" id="form-price" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                    </div>
                    <div class="flex gap-2 pt-3">
                        <button type="button" onclick="deleteStock()" id="btn-delete" class="hidden bg-rose-950/40 border border-rose-900/30 text-rose-400 font-bold py-3.5 px-5 rounded-xl active:scale-98 transition text-xs">刪除</button>
                        <button type="submit" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-black py-3.5 px-4 rounded-xl active:scale-98 transition shadow-md text-sm">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const GAS_AI_URL = "https://script.google.com/macros/s/AKfycbzVKjy5nvE_PxnsyP7WdL7RPMPZMiXYU6dcSY7jeb_J54ejhdt9AegGu9QxoDCUMt810w/exec";

        const defaultStocks = [
            { id: "1", symbol: "00403A", name: "主動統一升級50", shares: 15000, cost: 10.13, price: 10.48 },
            { id: "2", symbol: "00878", name: "國泰永續高股息", shares: 25000, cost: 18.72, price: 33.19 },
            { id: "3", symbol: "009816", name: "凱基台灣TOP50", shares: 15000, cost: 10.88, price: 15.23 },
            { id: "4", symbol: "00981A", name: "主動統一台股增長", shares: 14000, cost: 26.25, price: 29.95 },
            { id: "5", symbol: "1216", name: "統一", shares: 3000, cost: 61.79, price: 78.40 },
            { id: "6", symbol: "1717", name: "長興", shares: 2000, cost: 37.19, price: 73.80 },
            { id: "7", symbol: "2886", name: "兆豐金", shares: 10000, cost: 33.44, price: 46.70 },
            { id: "8", symbol: "6274", name: "台燿", shares: 1000, cost: 157.48, price: 1570.00 },
            { id: "9", symbol: "8028", name: "昇陽半導體", shares: 2000, cost: 75.84, price: 312.50 },
            { id: "10", symbol: "8112", name: "至上", shares: 5000, cost: 47.69, price: 85.00 },
            { id: "11", symbol: "2881", name: "富邦金", shares: 8000, cost: 26.70, price: 124.50 },
            // 🛠️ 360 萬銀行資產，附註 MA
            { id: "12", symbol: "MA", name: "銀行資產", shares: 3600000, cost: 1.00, price: 1.00 }
        ];

        let stocks = JSON.parse(localStorage.getItem('github_portfolio_v7_lux')) || [...defaultStocks];
        let currentEditingId = null;

        function renderPortfolio() {
            const container = document.getElementById('stock-list-container');
            container.innerHTML = '';
            let totalMarketValue = 0; let totalCostValue = 0;

            stocks.forEach(stock => {
                const costSum = stock.shares * stock.cost;
                const marketValueSum = stock.shares * stock.price;
                const profit = marketValueSum - costSum;
                const profitPercent = costSum > 0 ? (profit / costSum) * 100 : 0;

                totalMarketValue += marketValueSum;
                totalCostValue += costSum;

                const card = document.createElement('div');
                card.className = "glass-panel border border-slate-800/70 rounded-2xl p-5 flex flex-wrap justify-between items-center gap-4 active:bg-slate-800/80 transition cursor-pointer shadow-md";
                card.onclick = () => openEditModal(stock);
                
                // 🛠️ 核心樣式防禦修正：若為 0% 或是銀行資產 MA，採用優雅的灰藍色平盤中性標籤，防止代碼卡死崩潰
                let profitBg = 'bg-slate-500/10 text-slate-400 border border-slate-500/20';
                let profitSign = '';
                if (stock.symbol !== "MA") {
                    profitBg = profit >= 0 ? 'bg-rose-500/10 text-rose-400 border border-rose-500/20' : 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
                    profitSign = profit >= 0 ? '+' : '';
                }

                card.innerHTML = `
                    <div class="space-y-1.5 min-w-[200px] flex-1">
                        <div class="flex items-baseline gap-2 flex-wrap">
                            <span class="font-mono font-black text-slate-400 text-sm">${stock.symbol || ''}</span>
                            <span class="font-black text-slate-100 text-base tracking-wide">${stock.name}</span>
                        </div>
                        <div class="text-xs text-slate-400 font-bold leading-relaxed">
                            ${stock.symbol === "MA" ? `可用餘額: <span class="text-slate-200">3,600,000</span> 元` : `庫存: <span class="text-slate-200">${stock.shares.toLocaleString()}</span> 股 · 成本: <span class="text-slate-200">${stock.cost}</span><br>最新現價: <span class="text-teal-400 font-extrabold">${stock.price.toLocaleString()}</span> 元`}
                        </div>
                    </div>
                    <div class="flex items-center gap-3.5 ml-auto text-right flex-wrap justify-end">
                        <div class="space-y-1">
                            <div class="font-mono font-black text-slate-200 text-base">$${Math.round(marketValueSum).toLocaleString()}</div>
                            <div class="text-xs text-slate-400 font-bold">
                                成本 $${Math.round(costSum).toLocaleString()}
                            </div>
                        </div>
                        <div class="px-2.5 py-1.5 rounded-xl text-xs font-mono font-black ${profitBg} min-w-[82px] text-center shadow-inner shrink-0">
                            ${stock.symbol === "MA" ? "儲蓄" : `${profitSign}${profitPercent.toFixed(1)}%`}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            const totalProfit = totalMarketValue - totalCostValue;
            const totalProfitPercent = totalCostValue > 0 ? (totalProfit / totalCostValue) * 100 : 0;
            
            document.getElementById('total-value').innerText = `$${Math.round(totalMarketValue).toLocaleString()}`;
            document.getElementById('total-cost').innerText = `$${Math.round(totalCostValue).toLocaleString()}`;
            
            const totalProfitEl = document.getElementById('total-profit');
            totalProfitEl.innerText = `${totalProfit >= 0 ? '+' : ''}${Math.round(totalProfit).toLocaleString()} (${totalProfitPercent.toFixed(2)}%)`;
            totalProfitEl.className = `font-black text-base ${totalProfit >= 0 ? 'text-rose-400' : 'text-green-400'}`;
        }

        function fetchAllData() {
            fetchPricesDirectly();
            fetchAiReportFromGas();
        }

        function fetchPricesDirectly() {
            const btn = document.getElementById('btn-refresh');
            const statusEl = document.getElementById('update-status');
            btn.innerText = "⏳ 同步中...";
            btn.disabled = true;

            const oldScript = document.getElementById('twse-core-handler');
            if (oldScript) oldScript.remove();

            window.onReceiveTwseData = function(rawData) {
                try {
                    let updatedCount = 0; const twseMap = {};
                    rawData.forEach(item => { if (item.Code) twseMap[item.Code.trim()] = parseFloat(item.ClosingPrice); });

                    stocks = stocks.map(stock => {
                        if (!stock.symbol) return stock;
                        const code = stock.symbol.trim();
                        // 🛠️ 強制保護：MA 屬於固定資產，同步時絕對維持 1 元
                        if (code === "MA") return { ...stock, price: 1.00 };
                        if (twseMap[code] && !isNaN(twseMap[code]) && twseMap[code] > 0) { updatedCount++; return { ...stock, price: twseMap[code] }; }
                        return stock;
                    });
                    const now = new Date();
                    statusEl.innerText = `SUCCESS · 行情已同步 · ${now.toLocaleTimeString()}`;
                } catch (e) {
                    statusEl.innerText = "DATA ERROR · 維持快取";
                } finally {
                    btn.innerHTML = "🔄 同步數據"; btn.disabled = false;
                    saveToLocalStorage(); renderPortfolio();
                }
            };

            const script = document.createElement('script');
            script.id = 'twse-core-handler';
            script.src = 'https://rshadow.github.io/twse-openapi/data/exchangeReport/STOCK_DAY_ALL.js';
            script.onerror = function() {
                statusEl.innerText = "WEEKEND · 週末市場休市中";
                btn.innerHTML = "🔄 同步數據"; btn.disabled = false;
                renderPortfolio();
            };
            document.body.appendChild(script);
        }

        function fetchAiReportFromGas() {
            const oldScript = document.getElementById('gas-ai-handler');
            if (oldScript) oldScript.remove();

            window.onReceiveAiReport = function(data) {
                if (data && data.status === "success") {
                    document.getElementById('ai-date').innerText = data.date;
                    document.getElementById('ai-report-content').innerText = data.report;
                } else {
                    document.getElementById('ai-report-content').innerText = "晨報解析失敗，請確認 Google 試算表端設定。";
                }
            };

            const script = document.createElement('script');
            script.id = 'gas-ai-handler';
            script.src = GAS_AI_URL;
            script.onerror = function() {
                document.getElementById('ai-report-content').innerText = "無法連線至雲端大腦。請確認 Google 部署設定是否設為「所有人」。";
                document.getElementById('ai-date').innerText = "ERROR";
            };
            document.body.appendChild(script);
        }

        function toggleModal(show) {
            const modal = document.getElementById('stock-modal');
            if (show) {
                modal.classList.remove('hidden');
            } else { 
                modal.classList.add('hidden'); 
                document.getElementById('stock-form').reset(); 
                currentEditingId = null; 
                document.getElementById('btn-delete').classList.add('hidden');
                document.getElementById('yahoo-link-container').style.display = 'none';
            }
        }

        function openEditModal(stock) {
            currentEditingId = stock.id;
            document.getElementById('form-symbol').value = stock.symbol || '';
            document.getElementById('form-name').value = stock.name;
            document.getElementById('form-shares').value = stock.shares;
            document.getElementById('form-cost').value = stock.cost;
            document.getElementById('form-price').value = stock.price;
            document.getElementById('btn-delete').classList.remove('hidden');

            const cleanSymbol = (stock.symbol || '').trim().toUpperCase();
            let finalTargetUrl = "";

            if (cleanSymbol === "00403A") {
                finalTargetUrl = "https://tw.stock.yahoo.com/fund/summary/F0000179A9:FO";
            } else if (cleanSymbol === "00981A") {
                finalTargetUrl = "https://tw.stock.yahoo.com/fund/summary/F000016N6K:FO";
            } else if (cleanSymbol === "MA") {
                finalTargetUrl = "https://tw.stock.yahoo.com/";
            } else if (cleanSymbol) {
                finalTargetUrl = `https://tw.stock.yahoo.com/quote/${cleanSymbol}`;
            } else {
                finalTargetUrl = `https://tw.stock.yahoo.com/search?q=${encodeURIComponent(stock.name)}`;
            }

            const btnEl = document.getElementById('yahoo-stock-link-btn');
            btnEl.innerText = cleanSymbol === "MA" ? `🔍 查看大盤走勢 (Yahoo 股市)` : `🔍 查詢 ${cleanSymbol || stock.name} 盤勢 (Yahoo 股市)`;
            
            btnEl.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                window.open(finalTargetUrl, '_blank', 'noopener,noreferrer');
                return false;
            };
            
            document.getElementById('yahoo-link-container').style.display = 'block';
            toggleModal(true);
        }

        function saveStock(e) {
            e.preventDefault();
            const symbol = document.getElementById('form-symbol').value.trim().toUpperCase();
            const name = document.getElementById('form-name').value.trim();
            const shares = parseInt(document.getElementById('form-shares').value);
            const cost = parseFloat(document.getElementById('form-cost').value);
            const price = parseFloat(document.getElementById('form-price').value);

            if (currentEditingId) { stocks = stocks.map(s => s.id === currentEditingId ? { ...s, symbol, name, shares, cost, price } : s); }
            else { stocks.push({ id: Date.now().toString(), symbol, name, shares, cost, price }); }
            saveToLocalStorage(); toggleModal(false); renderPortfolio(); fetchPricesDirectly();
        }

        function deleteStock() {
            if (currentEditingId && confirm('確定要移除此持股記錄嗎？')) {
                stocks = stocks.filter(s => s.id !== currentEditingId);
                saveToLocalStorage(); toggleModal(false); renderPortfolio();
            }
        }

        function resetToDefault() {
            if (confirm('確定要將數據重置回初始設定嗎？')) { stocks = [...defaultStocks]; saveToLocalStorage(); renderPortfolio(); }
        }

        function saveToLocalStorage() { localStorage.setItem('github_portfolio_v7_lux', JSON.stringify(stocks)); }

        renderPortfolio();
        window.addEventListener('load', () => { 
            document.getElementById('yahoo-link-container').style.display = 'none';
            setTimeout(fetchAllData, 500); 
        });
    </script>
</body>
</html>
