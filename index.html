<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
    <title>我的頂級資產追蹤系統</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-finance-dark text-gray-100 min-h-screen pb-28">

    <div class="p-4 pt-6">
        <div class="relative overflow-hidden rounded-3xl p-6 bg-gradient-to-br from-slate-800 via-slate-900 to-black border border-slate-700/40 shadow-2xl">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
            
            <div class="flex flex-wrap justify-between items-start gap-4">
                <div>
                    <h1 class="text-xs uppercase tracking-widest text-slate-400 font-bold">Net Worth · 總資產估值</h1>
                    <div id="total-value" class="hero-money font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-300 to-emerald-200 tracking-tight my-2">
                        $0
                    </div>
                </div>
                <button type="button" id="btn-refresh" class="bg-slate-800/80 hover:bg-slate-700 border border-slate-700/60 text-slate-200 px-4 py-2.5 rounded-xl text-xs font-black flex items-center gap-1 active:scale-95 transition shadow-sm shrink-0">
                    🔄 同步數據
                </button>
            </div>
            
            <div class="w-full h-px bg-slate-800/60 my-4"></div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                <div>
                    <span class="text-slate-400 block text-xs uppercase font-bold mb-0.5">投入總成本</span>
                    <span id="total-cost" class="money-value text-slate-100 font-black text-base tracking-wide">0</span>
                </div>
                <div class="sm:text-right">
                    <span class="text-slate-400 block text-xs uppercase font-bold mb-0.5">未實現總損益</span>
                    <span id="total-profit" class="money-value responsive-profit font-black text-base tracking-wide">0</span>
                </div>
            </div>
            <div id="update-status" class="text-xs text-slate-500 mt-2.5 text-right font-medium italic">系統就緒</div>
        </div>
    </div>

    <div class="px-4 mb-4">
        <div class="glass-panel border border-slate-800/80 rounded-2xl p-5 shadow-xl relative overflow-hidden">
            <div class="absolute -left-6 -bottom-6 w-20 h-20 bg-teal-500/5 rounded-full blur-2xl"></div>
            <div class="flex flex-wrap justify-between items-center gap-2 mb-3">
                <div class="flex items-center gap-1.5">
                    <span class="text-teal-400 text-base">🔮</span>
                    <h2 class="text-sm font-black tracking-wide text-slate-200">每日市場晨報</h2>
                </div>
                <span id="ai-date" class="text-xs font-mono font-bold px-2 py-0.5 rounded-md bg-slate-950/60 text-slate-400">加載中...</span>
            </div>
            <div id="ai-report-content" class="text-xs text-slate-300 leading-relaxed whitespace-pre-wrap font-sans max-h-56 overflow-y-auto pr-1">
                正在讀取最新市場晨報…
            </div>
        </div>
    </div>

    <div class="px-4 mb-5 flex flex-wrap gap-2">
        <button type="button" id="btn-add" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black py-4 px-4 rounded-2xl text-sm tracking-wide shadow-lg shadow-emerald-900/20 active:scale-98 transition flex justify-center items-center gap-1 min-w-[180px]">
            ➕ 新增 / 調整持股資產
        </button>
        <button type="button" id="btn-reset" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-400 py-4 px-5 rounded-2xl text-xs font-bold active:scale-98 transition">
            重置
        </button>
    </div>

    <div class="px-4 space-y-3" id="stock-list-container">
        </div>

    <div class="p-8 text-center text-slate-600 text-xs tracking-wider space-y-1 font-bold">
        <div>資料僅儲存在此瀏覽器，未經加密</div>
        <div>行情為最近可取得的收盤資料，非即時報價</div>
    </div>

    <div id="stock-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 overflow-y-auto">
        <div class="bg-slate-900 w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-0 shadow-2xl border border-slate-800/80 overflow-hidden my-auto">
            
            <div id="yahoo-link-container" class="p-5 bg-emerald-950/20 border-b border-slate-800">
                <button type="button" id="yahoo-stock-link-btn" class="w-full bg-slate-950/80 hover:bg-emerald-950/50 text-emerald-400 border border-emerald-500/50 font-black py-4 px-4 rounded-xl flex items-center justify-center gap-2 transition active:scale-95 text-sm tracking-wider shadow-md text-center cursor-pointer">
                    🔍 查詢個股盤勢 (外連 Yahoo 股市)
                </button>
            </div>

            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-base font-bold text-slate-200 tracking-wide">編輯持股資訊</h3>
                    <button type="button" id="btn-close" aria-label="關閉編輯視窗" class="text-slate-400 text-xl p-2">&times;</button>
                </div>

                <form id="stock-form" class="space-y-4 text-sm font-bold">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">股票代號</label>
                        <input type="text" id="form-symbol" required maxlength="20" autocomplete="off" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">股票名稱</label>
                        <input type="text" id="form-name" required maxlength="80" autocomplete="off" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">即時庫存 (股)</label>
                            <input type="number" id="form-shares" required min="0" max="1000000000000" step="1" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">成本均價 (元)</label>
                            <input type="number" step="0.01" id="form-cost" required min="0" max="1000000000" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">最新收盤價 (元)</label>
                        <input type="number" step="0.01" id="form-price" required min="0" max="1000000000" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 transition text-sm">
                    </div>
                    <div class="flex gap-2 pt-3">
                        <button type="button" id="btn-delete" class="hidden bg-rose-950/40 border border-rose-900/30 text-rose-400 font-bold py-3.5 px-5 rounded-xl active:scale-98 transition text-xs">刪除</button>
                        <button type="submit" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-black py-3.5 px-4 rounded-xl active:scale-98 transition shadow-md text-sm">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
