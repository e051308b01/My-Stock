<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的資產盤點與即時追蹤系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen pb-24">

    <div class="bg-gradient-to-b from-slate-800 to-gray-900 p-5 pt-8 rounded-b-3xl shadow-xl sticky top-0 z-10 border-b border-gray-800">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-xs text-gray-400 font-medium tracking-wider">總資產估值 (TWD)</h1>
                <div id="total-value" class="text-3xl font-black text-emerald-400 my-1">計算中...</div>
            </div>
            <button onclick="fetchLatestPrices()" id="btn-refresh" class="bg-emerald-600/20 hover:bg-emerald-600 text-emerald-400 hover:text-white border border-emerald-500/30 px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 active:scale-95 transition">
                🔄 自動更新現價
            </button>
        </div>
        <div class="flex justify-between items-center text-xs mt-3 text-gray-400">
            <div>投入成本: <span id="total-cost" class="text-gray-200 font-semibold">0</span></div>
            <div>未實現損益: <span id="total-profit" class="font-bold">0</span></div>
        </div>
        <div id="update-status" class="text-3xs text-gray-500 mt-2 text-right">正在連線即時行情...</div>
    </div>

    <div class="p-4 flex gap-2">
        <button onclick="toggleModal(true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl text-sm shadow-lg flex justify-center items-center gap-1 active:scale-98 transition">
            ➕ 新增 / 調整持股
        </button>
        <button onclick="resetToDefault()" class="bg-gray-800 hover:bg-gray-700 text-gray-400 py-3 px-4 rounded-xl text-xs active:scale-98 transition">
            重置回現況
        </button>
    </div>

    <div class="px-4 space-y-3" id="stock-list-container">
        </div>

    <div class="p-6 text-center text-gray-600 text-2xs space-y-1">
        <div>* 點擊卡片即可修改庫存數量、買進成本或手動覆蓋股價。</div>
        <div>* 已切換為標準 HTTPS 異步 Fetch 協定，完美支援雲端自動化行情同步。</div>
    </div>

    <div id="stock-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-gray-800 w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl transform transition-transform border-t border-gray-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-100">編輯持股資訊</h3>
                <button onclick="toggleModal(false)" class="text-gray-400 text-xl p-2">&times;</button>
            </div>
            <form id="stock-form" onsubmit="saveStock(event)" class="space-y-4 text-sm">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">股票代號 (例如: 6274)</label>
                    <input type="text" id="form-symbol" required placeholder="請輸入純數字或ETF代號" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">股票名稱 (例如: 台燿)</label>
                    <input type="text" id="form-name" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">即時庫存 (股)</label>
                        <input type="number" id="form-shares" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">成本均價 (元)</label>
                        <input type="number" step="0.01" id="form-cost" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">最新現價 (元)</label>
                    <input type="number" step="0.01" id="form-price" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="deleteStock()" id="btn-delete" class="hidden bg-rose-900/40 hover:bg-rose-900 text-rose-300 font-medium py-3 px-4 rounded-xl active:scale-98 transition">刪除</button>
                    <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg active:scale-98 transition">儲存設定</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const defaultStocks = [
            { id: "1", symbol: "00403A", name: "主動統一升級50", shares: 15000, cost: 10.13, price: 10.48 },
            { id: "2", symbol: "00878", name: "國泰永續高股息", shares: 25000, cost: 18.72, price: 33.19 },
            { id: "3", symbol: "009816", name: "凱基台灣TOP50", shares: 15000, cost: 10.88, price: 15.23 },
            { id: "4", symbol: "00981A", name: "主動統一台股增長", shares: 14000, cost: 26.25, price: 29.95 },
            { id: "5", symbol: "1216", name: "統一", shares: 3000, cost: 61.79, price: 78.40 },
            { id: "6", symbol: "1717", name: "長興", shares: 2000, cost: 37.19, price: 73.80 },
            { id: "7", symbol: "2886", name: "兆豐金", shares: 10000, cost: 33.44, price: 46.70 },
            { id: "8", symbol: "6274", name: "台燿", shares: 1000, cost: 157.48, price: 1570.00 },
            { id: "9", symbol: "8028", name: "昇陽半導體", shares: 2000, cost: 75.84, price: 312.50 },
            { id: "10", symbol: "8112", name: "至上", shares: 5000, cost: 47.69, price: 85.00 },
            { id: "11", symbol: "2881", name: "富邦金", shares: 8000, cost: 26.70, price: 26.70 }
        ];

        let stocks = JSON.parse(localStorage.getItem('github_portfolio_v4')) || [...defaultStocks];
        let currentEditingId = null;

        function renderPortfolio() {
            const container = document.getElementById('stock-list-container');
            container.innerHTML = '';
            
            let totalMarketValue = 0;
            let totalCostValue = 0;

            stocks.forEach(stock => {
                const costSum = stock.shares * stock.cost;
                const marketValueSum = stock.shares * stock.price;
                const profit = marketValueSum - costSum;
                const profitPercent = costSum > 0 ? (profit / costSum) * 100 : 0;

                totalMarketValue += marketValueSum;
                totalCostValue += costSum;

                const card = document.createElement('div');
                card.className = "bg-gray-800/60 border border-gray-800 rounded-2xl p-4 flex justify-between items-center active:bg-gray-700/50 transition cursor-pointer shadow-sm";
                card.onclick = () => openEditModal(stock);
                
                const profitClass = profit >= 0 ? 'text-rose-400' : 'text-green-400';
                const profitSign = profit >= 0 ? '+' : '';

                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="font-bold text-gray-100 text-base tracking-wide">${stock.symbol} ${stock.name}</div>
                        <div class="text-xs text-gray-400">
                            庫存 ${stock.shares.toLocaleString()} 股 · 均價 ${stock.cost}
                        </div>
                        <div class="text-2xs text-gray-500">最新現價: ${stock.price.toLocaleString()} 元</div>
                    </div>
                    <div class="text-right space-y-0.5">
                        <div class="font-bold text-gray-200 text-sm">$${Math.round(marketValueSum).toLocaleString()}</div>
                        <div class="text-xs font-bold ${profitClass}">
                            ${profitSign}${Math.round(profit).toLocaleString()}
                        </div>
                        <div class="text-2xs ${profitClass} font-medium">
                            ${profitSign}${profitPercent.toFixed(2)}%
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            const totalProfit = totalMarketValue - totalCostValue;
            const totalProfitPercent = totalCostValue > 0 ? (totalProfit / totalCostValue) * 100 : 0;
            
            document.getElementById('total-value').innerText = `$${Math.round(totalMarketValue).toLocaleString()}`;
            document.getElementById('total-cost').innerText = `$${Math.round(totalCostValue).toLocaleString()}`;
            
            const totalProfitEl = document.getElementById('total-profit');
            totalProfitEl.innerText = `${totalProfit >= 0 ? '+' : ''}${Math.round(totalProfit).toLocaleString()} (${totalProfitPercent.toFixed(2)}%)`;
            totalProfitEl.className = `font-bold ${totalProfit >= 0 ? 'text-rose-400' : 'text-green-400'}`;
        }

        // 🚀 核心：在正式 HTTPS 雲端環境下，使用高相容性的免費公開節點進行非同步 Fetch
        async function fetchLatestPrices() {
            const btn = document.getElementById('btn-refresh');
            const statusEl = document.getElementById('update-status');
            btn.innerText = "⏳ 雲端同步中...";
            btn.disabled = true;

            let updatedCount = 0;

            try {
                // 串接在正式網域上完全合法、無跨域封鎖的台股大盤公開節點
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL'));
                if (!response.ok) throw new Error('雲端通訊異常');
                
                const wrapper = await response.json();
                const rawData = JSON.parse(wrapper.contents);

                // 將大盤數據快速建立為索引
                const twseMap = {};
                rawData.forEach(item => {
                    if (item.Code) {
                        twseMap[item.Code.trim()] = parseFloat(item.ClosingPrice);
                    }
                });

                // 自動更新符合台股公開資料庫的現價
                stocks = stocks.map(stock => {
                    const code = stock.symbol.trim();
                    if (twseMap[code] && !isNaN(twseMap[code]) && twseMap[code] > 0) {
                        updatedCount++;
                        return { ...stock, price: twseMap[code] };
                    }
                    return stock;
                });

                const now = new Date();
                statusEl.innerText = `同步成功 ${updatedCount} 檔 · 時間: ${now.toLocaleTimeString()}`;
            } catch (error) {
                console.error("Fetch 錯誤:", error);
                statusEl.innerText = "連線異常，已轉用本機最新快取價格。";
            } finally {
                btn.innerHTML = "🔄 自動更新現價";
                btn.disabled = false;
                saveToLocalStorage();
                renderPortfolio();
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('stock-modal');
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
                document.getElementById('stock-form').reset();
                currentEditingId = null;
                document.getElementById('btn-delete').classList.add('hidden');
            }
        }

        function openEditModal(stock) {
            currentEditingId = stock.id;
            document.getElementById('form-symbol').value = stock.symbol;
            document.getElementById('form-name').value = stock.name;
            document.getElementById('form-shares').value = stock.shares;
            document.getElementById('form-cost').value = stock.cost;
            document.getElementById('form-price').value = stock.price;
            
            document.getElementById('btn-delete').classList.remove('hidden');
            toggleModal(true);
        }

        function saveStock(e) {
            e.preventDefault();
            const symbol = document.getElementById('form-symbol').value.trim().toUpperCase();
            const name = document.getElementById('form-name').value.trim();
            const shares = parseInt(document.getElementById('form-shares').value);
            const cost = parseFloat(document.getElementById('form-cost').value);
            const price = parseFloat(document.getElementById('form-price').value);

            if (currentEditingId) {
                stocks = stocks.map(s => s.id === currentEditingId ? { ...s, symbol, name, shares, cost, price } : s);
            } else {
                const newStock = {
                    id: Date.now().toString(),
                    symbol, name, shares, cost, price
                };
                stocks.push(newStock);
            }

            saveToLocalStorage();
            toggleModal(false);
            renderPortfolio();
            fetchLatestPrices();
        }

        function deleteStock() {
            if (currentEditingId && confirm('確定要移除此持股記錄嗎？')) {
                stocks = stocks.filter(s => s.id !== currentEditingId);
                saveToLocalStorage();
                toggleModal(false);
                renderPortfolio();
            }
        }

        function resetToDefault() {
            if (confirm('確定要將數據重置回初始 11 檔持股設定嗎？')) {
                stocks = [...defaultStocks];
                saveToLocalStorage();
                renderPortfolio();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('github_portfolio_v4', JSON.stringify(stocks));
        }

        // 初始渲染
        renderPortfolio();
        
        // 上線網頁加載完成後自動抓取一次最新收盤價
        window.addEventListener('load', () => {
            setTimeout(fetchLatestPrices, 500);
        });
    </script>
</body>
</html>
