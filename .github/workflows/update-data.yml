name: Update market data

on:
  schedule:
    # 17:15 Asia/Taipei, after the official daily close files are available.
    - cron: '15 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch and validate remote data
        run: node scripts/update-data.mjs
      - name: Commit changed snapshots
        run: |
          if git diff --quiet -- data; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: update market data"
          git push
